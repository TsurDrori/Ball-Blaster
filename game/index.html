<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ball Blast</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <!-- ══ מסך הבית ══ -->
    <div id="home-screen">
        <h1>💣 Ball Blast</h1>

        <div id="bank-row">
            <div id="bank-display">
                <span class="coin-icon">🪙</span>
                <span id="bank-amount">0</span>
            </div>
            <div id="hs-display">
                <span>שיא: גל <span id="hs-wave">0</span></span>
                <span id="next-wave-display">ריצה חדשה מגל 1</span>
            </div>
        </div>

        <div id="shop-tabs">
            <button class="shop-tab active" id="tab-upgrades" onclick="switchShopTab('upgrades')">⚡ שדרוגים</button>
            <button class="shop-tab" id="tab-skins" onclick="switchShopTab('skins')">🎨 סקינים</button>
        </div>

        <div id="upgrade-shop">
            <div class="shop-heading">🛒 שדרוגים</div>
            <div id="upgrade-grid">
                <button class="upgrade-btn" id="btn-fireRate"  onclick="buyUpgrade('fireRate')">
                    ⚡ קצב ירי<br><small>Lv.1 · 🪙50</small>
                </button>
                <button class="upgrade-btn" id="btn-damage"    onclick="buyUpgrade('damage')">
                    💥 עוצמה<br><small>Lv.1 · 🪙80</small>
                </button>
                <button class="upgrade-btn" id="btn-multiShot" onclick="buyUpgrade('multiShot')">
                    🎯 רב-כדורי<br><small>Lv.1 · 🪙120</small>
                </button>
                <button class="upgrade-btn" id="btn-ballSize"  onclick="buyUpgrade('ballSize')">
                    🔵 גודל כדור<br><small>Lv.1 · 🪙60</small>
                </button>
                <button class="upgrade-btn" id="btn-lives"     onclick="buyUpgrade('lives')">
                    ❤️ חיים<br><small>Lv.1 · 🪙100</small>
                </button>
            </div>
        </div>

        <div id="skins-shop" style="display:none">
            <div id="skin-subtabs">
                <button class="skin-subtab active" id="stab-cannon" onclick="switchSkinSubtab('cannon')">🔫 תותח</button>
                <button class="skin-subtab" id="stab-bullet" onclick="switchSkinSubtab('bullet')">🔵 כדורים</button>
            </div>
            <div id="skin-grid-cannon" class="skin-grid"></div>
            <div id="skin-grid-bullet" class="skin-grid" style="display:none"></div>
        </div>

        <button id="start-btn" onclick="startGame()">▶ התחל משחק</button>

        <div id="dev-panel">
            <button id="dev-toggle" onclick="toggleDevMode()">🔧 מצב פיתוח: כבוי</button>
            <div id="dev-content">
                <div class="dev-row">
                    <button class="dev-reset-btn" onclick="devResetUpgrades()">🗑️ אפס שדרוגים</button>
                </div>
                <div class="dev-row">
                    <label for="dev-wave">גל התחלה</label>
                    <input type="number" id="dev-wave" value="1" min="1" max="999" oninput="onDevWaveInput()">
                </div>
                <div class="dev-row">
                    <label for="dev-coins">מטבעות</label>
                    <input type="number" id="dev-coins" value="0" min="0" oninput="onDevCoinsInput()">
                </div>
                <div class="dev-row">
                    <label for="dev-boost">בוסט התחלה</label>
                    <select id="dev-boost"></select>
                </div>
            </div>
        </div>

        <div id="sound-toggle" onclick="toggleMute()" title="קול">🔊</div>

        <div id="controls-hint">← → / A D לזוז &nbsp;·&nbsp; תותח יורה אוטומטית</div>
    </div>

    <!-- ══ מסך המשחק ══ -->
    <div id="game-screen" style="display:none">
        <div id="canvas-wrapper">
            <canvas id="bgCanvas"   width="480" height="800"></canvas>
            <canvas id="gameCanvas" width="480" height="800"></canvas>
            <button id="pause-btn" onclick="togglePause()" title="השהה">⏸</button>
            <div id="pause-overlay" style="display:none">
                <div id="pause-menu">
                    <div class="pause-title">⏸ השהיה</div>
                    <button class="pause-menu-btn" onclick="togglePause()">▶ המשך</button>
                    <button class="pause-menu-btn pause-exit-btn" onclick="exitToHome()">🏠 צא למסך הבית</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load order matters: constants first, then classes, then main loop -->
    <script src="skins.js?v=3"></script>
    <script src="webgl-background.js?v=3"></script>
    <script src="background.js?v=3"></script>
    <script src="sound.js?v=3"></script>
    <script src="gameState.js?v=3"></script>
    <script src="bullet.js?v=3"></script>
    <script src="cannon.js?v=3"></script>
    <script src="enemy.js?v=3"></script>
    <script src="coin.js?v=3"></script>
    <script src="powerup.js?v=3"></script>
    <script src="waveManager.js?v=3"></script>
    <script src="ui.js?v=3"></script>
    <script src="effects.js?v=3"></script>
    <script src="game.js?v=3"></script>
    <script>
        // מלא את רשימת הבוסטים בפאנל הפיתוח
        const sel = document.getElementById('dev-boost');
        sel.innerHTML = '<option value="">ללא בוסט</option>' +
            RUN_UPGRADE_POOL.map(u => `<option value="${u.id}">${u.icon} ${u.name}</option>`).join('');
    </script>
</body>
</html>
